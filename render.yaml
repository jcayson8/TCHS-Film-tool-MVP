services:
  - type: web
    name: tchs-film-prod
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tchs-film-db
          property: connectionString
    disk:
      name: media-disk
      mountPath: /data
      sizeGB: 50

databases:
  - name: tchs-film-db
    plan: basic-256mb
    diskSizeGB: 15
